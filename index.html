<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard ROI · MaFormation</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#fff;--bg2:#f7f7f5;--bg3:#f1efea;--text:#1a1a18;--text2:#6b6b66;--text3:#a0a09a;
      --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
      --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#0C447C;
      --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;
      --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#633806;
      --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#791F1F;
      --r:8px;--rl:12px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#1e1e1c;--bg2:#2a2a28;--bg3:#323230;--text:#e8e6e0;--text2:#9e9c96;--text3:#6b6966;
      --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
      --blue-bg:#0c2d4a;--blue-text:#85B7EB;--green-bg:#04342C;--green-text:#9FE1CB;
      --amber-bg:#412402;--amber-text:#FAC775;--red-bg:#501313;--red-text:#F09595;
    }}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--bg);border-right:.5px solid var(--border);display:flex;flex-direction:column;z-index:100;}
    .slogo{padding:20px 20px 16px;border-bottom:.5px solid var(--border);}
    .slogo h1{font-size:15px;font-weight:600;}
    .slogo p{font-size:11px;color:var(--text3);margin-top:2px;}
    .snav{flex:1;padding:12px 0;overflow-y:auto;}
    .nsec{padding:4px 12px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px;}
    .ni{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-radius:6px;margin:1px 8px;transition:background .12s;}
    .ni:hover{background:var(--bg2);color:var(--text);}
    .ni.active{background:var(--blue-bg);color:var(--blue-text);font-weight:500;}
    .ni svg{width:16px;height:16px;flex-shrink:0;}
    .sfooter{padding:12px 16px;border-top:.5px solid var(--border);font-size:12px;color:var(--text3);}
    .sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;}
    .main{margin-left:220px;padding:0;}

    /* Filter bar */
    .filterbar{
      position:sticky;top:0;z-index:50;
      background:var(--bg);border-bottom:.5px solid var(--border);
      padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .filterbar label{font-size:12px;color:var(--text2);white-space:nowrap;}
    .filterbar select,.filterbar input{
      font-size:13px;padding:5px 10px;
      border:.5px solid var(--border2);border-radius:var(--r);
      background:var(--bg);color:var(--text);height:32px;
    }
    .filterbar select:focus,.filterbar input:focus{outline:none;border-color:var(--blue);}
    .filter-sep{width:.5px;height:20px;background:var(--border2);margin:0 4px;}
    .filter-active{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .filter-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text);font-weight:500;}
    .filter-tag button{background:none;border:none;cursor:pointer;color:var(--blue-text);font-size:14px;line-height:1;padding:0;}
    .btn-reset{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--r);}
    .btn-reset:hover{background:var(--bg2);color:var(--text);}

    .content{padding:28px 32px;max-width:1200px;}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .ttitle{font-size:20px;font-weight:600;}
    .tsub{font-size:13px;color:var(--text2);margin-top:2px;}
    .btn{font-size:13px;padding:7px 14px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s;}
    .btn:hover{background:var(--bg2);}
    .btn.p{background:var(--blue);color:#fff;border-color:var(--blue);}
    .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
    .kcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:16px 18px;}
    .klbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
    .kval{font-size:24px;font-weight:600;line-height:1;}
    .ksub{font-size:12px;color:var(--text3);margin-top:5px;}
    .kcard.pos .kval{color:var(--green);}
    .kcard.neg .kval{color:var(--red);}
    .kcard.bl .kval{color:var(--blue);}
    .sec{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:20px;}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .st{font-size:14px;font-weight:600;}
    .stag{font-size:12px;color:var(--text3);}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;font-size:11px;font-weight:600;color:var(--text2);padding:8px 10px;border-bottom:.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
    td{padding:9px 10px;border-bottom:.5px solid var(--border);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--bg2);}
    .tdt{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;}
    .bg{background:var(--green-bg);color:var(--green-text);}
    .bb{background:var(--blue-bg);color:var(--blue-text);}
    .br{background:var(--red-bg);color:var(--red-text);}
    .ba{background:var(--amber-bg);color:var(--amber-text);}
    .cw{position:relative;width:100%;}
    .izone{border:2px dashed var(--border2);border-radius:var(--rl);padding:48px 32px;text-align:center;cursor:pointer;transition:background .15s;}
    .izone:hover,.izone.drag{background:var(--bg2);border-color:var(--blue);}
    .izone h3{font-size:16px;font-weight:500;margin-bottom:8px;}
    .izone p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
    .spin{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--blue);animation:spin .7s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="slogo"><h1>ROI Dashboard</h1><p id="sch">MaFormation</p></div>
  <nav class="snav">
    <div class="nsec">Vues</div>
    <div class="ni active" onclick="setView('global')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Vue globale
    </div>
    <div class="ni" onclick="setView('monthly')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="12" rx="1.5"/><path d="M5 1v4M11 1v4M1 7h14"/></svg>
      Par mois
    </div>
    <div class="ni" onclick="setView('campaign')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l4-8 3 5 2-3 3 6"/><rect x="1" y="1" width="14" height="14" rx="2"/></svg>
      Par campagne
    </div>
    <div class="nsec">Données</div>
    <div class="ni" onclick="setView('import')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 12h10"/></svg>
      Importer JSON
    </div>
  </nav>
  <div class="sfooter"><span class="sdot"></span><span id="slbl">En attente de données</span></div>
</div>

<main class="main" id="main"></main>

<script>
const A = {
  view: 'import',
  data: null,
  f: { monthFrom: '', monthTo: '', campaign: '' }
};

const fE = n => typeof n==='number'&&n!==0 ? n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}) : '—';
const fP = n => typeof n==='number'&&isFinite(n) ? n.toFixed(1)+'%' : '—';
const fR = n => n==null ? '—' : (n>=0?'+':'')+Math.round(n)+'%';
const fN = n => typeof n==='number' ? n.toLocaleString('fr-FR') : '—';
const fCpl = n => typeof n==='number'&&n>0 ? n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}) : '—';
const fCac = n => typeof n==='number'&&n>0 ? n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}) : '—';
// CAC = CPL réel / taux de closing = coût TTC / nb deals gagnés

function rb(roi) {
  if (roi==null) return '<span class="badge" style="background:var(--bg2);color:var(--text2)">—</span>';
  if (roi>=500) return `<span class="badge bg">${fR(roi)}</span>`;
  if (roi>=0) return `<span class="badge bb">${fR(roi)}</span>`;
  return `<span class="badge br">${fR(roi)}</span>`;
}

function setView(v) {
  A.view = v;
  document.querySelectorAll('.ni').forEach(el => el.classList.remove('active'));
  ['global','monthly','campaign','import'].forEach((x,i) => {
    if (x===v) document.querySelectorAll('.ni')[i]?.classList.add('active');
  });
  render();
}

function loadJSON(txt) {
  try {
    A.data = JSON.parse(txt);
    A.f = { monthFrom: '', monthTo: '', campaign: '' };
    document.getElementById('slbl').textContent = `Maj ${A.data.generated_at}`;
    document.getElementById('sch').textContent = A.data.channel || 'Dashboard';
    setView('global');
  } catch(e) { alert('JSON invalide: '+e.message); }
}

// ── Filtrage ───────────────────────────────────────────────────
function getMonths() {
  if (!A.data) return [];
  return [...new Set(A.data.monthly.map(r => r.month))].sort();
}

function getCampaigns() {
  if (!A.data) return [];
  return [...new Set(A.data.campaigns.map(r => r.campaign))].filter(c => c && c !== '(Non renseigné)').sort();
}

function filterMonthly() {
  if (!A.data) return [];
  return A.data.monthly.filter(r => {
    if (A.f.monthFrom && r.month < A.f.monthFrom) return false;
    if (A.f.monthTo && r.month > A.f.monthTo) return false;
    return true;
  });
}

function filterCampaigns() {
  if (!A.data) return [];
  return A.data.campaigns.filter(r => {
    if (A.f.campaign && r.campaign !== A.f.campaign) return false;
    if (A.f.monthFrom || A.f.monthTo) return false; // campagnes non filtrables par mois dans le JSON actuel
    return true;
  });
}

function computeTotalsFromMonthly(monthly) {
  const nb_leads = monthly.reduce((s,r) => s+r.nb_leads, 0);
  const nb_won = monthly.reduce((s,r) => s+r.nb_deals_gagnes, 0);
  const ca = monthly.reduce((s,r) => s+r.ca, 0);
  const cout_ht = monthly.reduce((s,r) => s+r.cout_ht, 0);
  const cout_ttc = monthly.reduce((s,r) => s+r.cout_ttc, 0);
  const benefice = ca - cout_ttc;
  const roi = cout_ttc > 0 ? (benefice/cout_ttc*100) : null;
  const panier = nb_won > 0 ? ca/nb_won : 0;
  return { nb_leads, nb_deals_gagnes: nb_won, ca, cout_ht, cout_ttc, benefice_net: benefice, roi, panier_moyen: panier };
}

function hasActiveFilters() {
  return A.f.monthFrom || A.f.monthTo || A.f.campaign;
}

function resetFilters() {
  A.f = { monthFrom: '', monthTo: '', campaign: '' };
  render();
}

// ── Filter bar HTML ────────────────────────────────────────────
function renderFilterBar() {
  if (!A.data || A.view === 'import') return '';
  const months = getMonths();
  const campaigns = getCampaigns();
  const tags = [];
  if (A.f.monthFrom) tags.push({label: `Depuis ${A.f.monthFrom}`, key: 'monthFrom'});
  if (A.f.monthTo) tags.push({label: `Jusqu'à ${A.f.monthTo}`, key: 'monthTo'});
  if (A.f.campaign) tags.push({label: A.f.campaign.length>35?A.f.campaign.substring(0,35)+'…':A.f.campaign, key: 'campaign'});

  return `
    <div class="filterbar">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text2);flex-shrink:0"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
      <label>De</label>
      <select onchange="A.f.monthFrom=this.value;render()">
        <option value="">Début</option>
        ${months.map(m => `<option value="${m}" ${A.f.monthFrom===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <label>À</label>
      <select onchange="A.f.monthTo=this.value;render()">
        <option value="">Fin</option>
        ${months.map(m => `<option value="${m}" ${A.f.monthTo===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <div class="filter-sep"></div>
      <label>Campagne</label>
      <select style="max-width:240px" onchange="A.f.campaign=this.value;render()">
        <option value="">Toutes</option>
        ${campaigns.map(c => `<option value="${c}" ${A.f.campaign===c?'selected':''}>${c.length>45?c.substring(0,45)+'…':c}</option>`).join('')}
      </select>
      ${tags.length > 0 ? `
        <div class="filter-sep"></div>
        <div class="filter-active">
          ${tags.map(t => `<span class="filter-tag">${t.label}<button onclick="A.f['${t.key}']='';render()">×</button></span>`).join('')}
          <button class="btn-reset" onclick="resetFilters()">Tout effacer</button>
        </div>` : ''}
      <span style="margin-left:auto;font-size:12px;color:var(--text3)" id="filter-count"></span>
    </div>`;
}

// ── Vues ───────────────────────────────────────────────────────
function rImport() {
  return `<div class="content">
    <div class="topbar"><div><div class="ttitle">Importer les données</div><div class="tsub">Glissez le fichier JSON généré par Claude</div></div></div>
    <div class="izone" id="dz" onclick="document.getElementById('fi').click()">
      <div class="spin"></div>
      <h3>Déposer le fichier pipedrive_data.json</h3>
      <p>Glissez-déposez le fichier ici, ou cliquez pour le sélectionner.<br>Généré par Claude à partir de vos exports CSV Pipedrive.</p>
      <button class="btn p" onclick="event.stopPropagation();document.getElementById('fi').click()">Choisir un fichier</button>
      <input type="file" id="fi" accept=".json" style="display:none" onchange="handleF(this)">
    </div>
    <div style="margin-top:16px;padding:16px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);font-size:13px;color:var(--text2);line-height:1.8">
      <strong style="color:var(--text)">Comment mettre à jour :</strong><br>
      1. Exportez vos CSV depuis Pipedrive (Prospects + Affaires avec archivés)<br>
      2. Envoyez-les à Claude : <em>"Mets à jour le dashboard"</em><br>
      3. Claude génère un nouveau <code>pipedrive_data.json</code><br>
      4. Importez-le ici — mise à jour instantanée
    </div>
  </div>`;
}

function rGlobal() {
  const monthly = filterMonthly();
  const t = hasActiveFilters() ? computeTotalsFromMonthly(monthly) : A.data.totals;
  const dk = matchMedia('(prefers-color-scheme:dark)').matches;
  const tc = dk?'#9e9c96':'#6b6b66', gc = dk?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';
  const labels = monthly.map(r=>r.month);
  const caD = monthly.map(r=>r.ca);
  const lD = monthly.map(r=>r.nb_leads);
  const cD = monthly.map(r=>r.cout_ttc);
  const filtLabel = hasActiveFilters() ? ' · filtré' : '';

  return `
    <div class="content">
      <div class="topbar">
        <div><div class="ttitle">Vue globale · MaFormation${filtLabel}</div><div class="tsub">Depuis ${A.data.data_start} · Coûts TTC (TVA 20%)</div></div>
      </div>
      <div class="kgrid">
        <div class="kcard bl"><div class="klbl">Leads totaux</div><div class="kval">${fN(t.nb_leads)}</div><div class="ksub">prospects + affaires</div></div>
        <div class="kcard pos"><div class="klbl">Deals gagnés</div><div class="kval">${fN(t.nb_deals_gagnes)}</div><div class="ksub">${fP(t.nb_leads>0?t.nb_deals_gagnes/t.nb_leads*100:0)} conv.</div></div>
        <div class="kcard"><div class="klbl">CA total</div><div class="kval" style="font-size:20px">${fE(t.ca)}</div><div class="ksub">panier ${fE(t.panier_moyen)}</div></div>
        <div class="kcard"><div class="klbl">Coût TTC</div><div class="kval" style="font-size:20px">${fE(t.cout_ttc)}</div><div class="ksub">HT ${fE(t.cout_ht)}</div></div>
        <div class="kcard"><div class="klbl">CPL réel TTC</div><div class="kval" style="font-size:20px;color:var(--amber)">${fE(t.nb_leads>0?Math.round(t.cout_ttc/t.nb_leads):0)}</div><div class="ksub">coût TTC / lead</div></div>
        <div class="kcard"><div class="klbl">CAC réel TTC</div><div class="kval" style="font-size:20px;color:var(--amber)">${fCac(t.nb_deals_gagnes>0?Math.round(t.cout_ttc/t.nb_deals_gagnes):0)}</div><div class="ksub">CPL ÷ taux closing</div></div>
        <div class="kcard pos"><div class="klbl">Bénéfice net</div><div class="kval" style="font-size:20px">${fE(t.benefice_net)}</div></div>
        <div class="kcard pos"><div class="klbl">ROI</div><div class="kval">${fR(t.roi)}</div><div class="ksub">sur coût TTC</div></div>
      </div>
      <div class="sec">
        <div class="sh"><span class="st">CA mensuel</span><span class="stag">par date de gain</span></div>
        <div class="cw" style="height:220px"><canvas id="cc"></canvas></div>
      </div>
      <div class="sec">
        <div class="sh"><span class="st">Leads & coût TTC</span><span class="stag">par mois de création</span></div>
        <div class="cw" style="height:200px"><canvas id="cl"></canvas></div>
      </div>
    </div>
    <script>(function(){
      const tc='${tc}',gc='${gc}';
      const l=${JSON.stringify(labels)},ca=${JSON.stringify(caD)},ld=${JSON.stringify(lD)},cd=${JSON.stringify(cD)};
      const bo={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11},maxRotation:45,autoSkip:true,maxTicksLimit:8},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11}},grid:{color:gc}}}};
      if(window._c1)window._c1.destroy();if(window._c2)window._c2.destroy();
      window._c1=new Chart(document.getElementById('cc'),{type:'bar',data:{labels:l,datasets:[{data:ca,backgroundColor:'#378ADD',borderRadius:4}]},options:{...bo,scales:{...bo.scales,y:{...bo.scales.y,ticks:{...bo.scales.y.ticks,callback:v=>v>=1000?(v/1000).toFixed(0)+'k€':v+'€'}}}}});
      window._c2=new Chart(document.getElementById('cl'),{type:'line',data:{labels:l,datasets:[
        {label:'Leads',data:ld,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,.12)',tension:.35,fill:true,pointRadius:3},
        {label:'Coût TTC',data:cd,borderColor:'#BA7517',backgroundColor:'rgba(186,117,23,.08)',tension:.35,fill:false,pointRadius:3,yAxisID:'y2'}
      ]},options:{...bo,plugins:{legend:{display:true,labels:{color:tc,font:{size:12},boxWidth:10}}},scales:{...bo.scales,y2:{position:'right',ticks:{color:tc,font:{size:11},callback:v=>v>=1000?(v/1000).toFixed(0)+'k€':v+'€'},grid:{display:false}}}}});
    })();<\/script>`;
}

function rMonthly() {
  const m = filterMonthly();
  const filtLabel = hasActiveFilters() ? ' · filtré' : '';
  return `<div class="content">
    <div class="topbar"><div><div class="ttitle">Par mois${filtLabel}</div><div class="tsub">Leads créés · Deals gagnés par date de gain · Coûts TTC</div></div></div>
    ${m.length === 0 ? '<div class="empty">Aucun résultat pour cette période.</div>' : `
    <div class="sec"><table>
      <thead><tr>
        <th>Mois</th><th>Leads</th>
        <th style="font-size:10px;color:var(--text3)">prospects</th>
        <th style="font-size:10px;color:var(--text3)">affaires</th>
        <th>Gagnés</th><th>Taux conv.</th><th>CA</th><th>Panier</th>
        <th>Coût HT</th><th>Coût TTC</th><th>CPL réel</th><th>CAC réel</th><th>Bénéfice</th><th>ROI</th>
      </tr></thead>
      <tbody>${m.map(r=>`<tr>
        <td><strong>${r.month}</strong></td>
        <td><strong>${fN(r.nb_leads)}</strong></td>
        <td style="color:var(--text3)">${fN(r.nb_prospects_nc)}</td>
        <td style="color:var(--text3)">${fN(r.nb_deals_crees)}</td>
        <td>${fN(r.nb_deals_gagnes)}</td>
        <td>${fP(r.nb_leads>0?r.nb_deals_gagnes/r.nb_leads*100:0)}</td>
        <td>${fE(r.ca)}</td><td>${fE(r.panier_moyen)}</td>
        <td style="color:var(--text2)">${fE(r.cout_ht)}</td>
        <td>${fE(r.cout_ttc)}</td>
        <td style="color:var(--amber)">${fCpl(r.nb_leads>0?Math.round(r.cout_ttc/r.nb_leads):0)}</td>
        <td style="color:var(--amber)">${fCac(r.nb_deals_gagnes>0?Math.round(r.cout_ttc/r.nb_deals_gagnes):0)}</td>
        <td style="color:${r.benefice_net>=0?'var(--green)':'var(--red)'}">${fE(r.benefice_net)}</td>
        <td>${rb(r.roi)}</td>
      </tr>`).join('')}
      <tr style="font-weight:600;background:var(--bg2)">
        ${(()=>{const t=computeTotalsFromMonthly(m);return`
          <td>Total</td><td>${fN(t.nb_leads)}</td><td></td><td></td>
          <td>${fN(t.nb_deals_gagnes)}</td>
          <td>${fP(t.nb_leads>0?t.nb_deals_gagnes/t.nb_leads*100:0)}</td>
          <td>${fE(t.ca)}</td><td>${fE(t.panier_moyen)}</td>
          <td style="color:var(--text2)">${fE(t.cout_ht)}</td>
          <td>${fE(t.cout_ttc)}</td>
          <td style="color:var(--amber)">${fCpl(t.nb_leads>0?Math.round(t.cout_ttc/t.nb_leads):0)}</td>
          <td style="color:var(--amber)">${fCac(t.nb_deals_gagnes>0?Math.round(t.cout_ttc/t.nb_deals_gagnes):0)}</td>
          <td style="color:${t.benefice_net>=0?'var(--green)':'var(--red)'}">${fE(t.benefice_net)}</td>
          <td>${rb(t.roi)}</td>`;})()}
      </tr>
      </tbody>
    </table></div>`}
  </div>`;
}

function rCampaign() {
  const monthly = filterMonthly();
  const activeMonths = new Set(monthly.map(r=>r.month));
  const hasPeriodFilter = A.f.monthFrom || A.f.monthTo;

  // Si filtre période actif, on ne peut pas filtrer les campagnes par mois (pas dans le JSON)
  // On affiche un message d'info
  let c = A.data.campaigns;
  if (A.f.campaign) c = c.filter(r => r.campaign === A.f.campaign);

  const filtLabel = hasActiveFilters() ? ' · filtré' : '';
  return `<div class="content">
    <div class="topbar"><div><div class="ttitle">Par campagne${filtLabel}</div>
    <div class="tsub">${c.length} campagnes · triées par CA${hasPeriodFilter?' · <span style="color:var(--amber)">filtre période non appliqué aux campagnes</span>':''}</div></div></div>
    ${c.length === 0 ? '<div class="empty">Aucune campagne pour cette sélection.</div>' : `
    <div class="sec"><table>
      <thead><tr>
        <th>Campagne</th><th>Leads</th><th>Gagnés</th><th>Taux</th>
        <th>CA</th><th>Panier</th><th>Coût HT</th><th>Coût TTC</th><th>CPL réel</th><th>CAC réel</th><th>Bénéfice</th><th>ROI</th>
      </tr></thead>
      <tbody>${c.map(r=>`<tr>
        <td class="tdt" title="${r.campaign}">${r.campaign}</td>
        <td>${fN(r.nb_leads)}</td><td>${fN(r.nb_deals_gagnes)}</td>
        <td>${fP(r.nb_leads>0?r.nb_deals_gagnes/r.nb_leads*100:0)}</td>
        <td>${fE(r.ca)}</td><td>${fE(r.panier_moyen)}</td>
        <td style="color:var(--text2)">${fE(r.cout_ht)}</td>
        <td>${fE(r.cout_ttc)}</td>
        <td style="color:var(--amber)">${fCpl(r.nb_leads>0?Math.round(r.cout_ttc/r.nb_leads):0)}</td>
        <td style="color:var(--amber)">${fCac(r.nb_deals_gagnes>0?Math.round(r.cout_ttc/r.nb_deals_gagnes):0)}</td>
        <td style="color:${r.benefice_net>=0?'var(--green)':'var(--red)'}">${fE(r.benefice_net)}</td>
        <td>${rb(r.roi)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function render() {
  const main = document.getElementById('main');
  if (!A.data && A.view !== 'import') { setView('import'); return; }

  let html = renderFilterBar();
  if (A.view === 'import') html = rImport();
  else if (A.view === 'global') html += rGlobal();
  else if (A.view === 'monthly') html += rMonthly();
  else if (A.view === 'campaign') html += rCampaign();

  main.innerHTML = html;

  main.querySelectorAll('script').forEach(s => {
    const ns = document.createElement('script');
    ns.textContent = s.textContent;
    s.replaceWith(ns);
  });

  if (A.view === 'import') setupDrop();

  // Mettre à jour le compteur de résultats
  const fc = document.getElementById('filter-count');
  if (fc && A.data) {
    const m = filterMonthly();
    const total_leads = m.reduce((s,r)=>s+r.nb_leads,0);
    const total_won = m.reduce((s,r)=>s+r.nb_deals_gagnes,0);
    if (hasActiveFilters()) fc.textContent = `${total_leads} leads · ${total_won} gagnés`;
  }
}

function handleF(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => loadJSON(e.target.result);
  r.readAsText(f);
}

function setupDrop() {
  const z = document.getElementById('dz'); if (!z) return;
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag'); });
  z.addEventListener('dragleave', () => z.classList.remove('drag'));
  z.addEventListener('drop', e => {
    e.preventDefault(); z.classList.remove('drag');
    const f = e.dataTransfer.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => loadJSON(ev.target.result);
    r.readAsText(f);
  });
}

render();
</script>
</body>
</html>
