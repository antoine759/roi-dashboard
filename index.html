<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oellear · ROI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brand:#545ac0;--brand2:#ef7738;--brand-light:#eeeffe;--brand2-light:#fff3ec;
      --bg:#ffffff;--bg2:#f8f8fb;--bg3:#f2f2f7;
      --text:#16161a;--text2:#5e5e72;--text3:#a0a0b8;
      --border:rgba(84,90,192,.1);--border2:rgba(84,90,192,.2);
      --green:#1a9e6e;--green-bg:#e6f7f1;--green-text:#0d6b4a;
      --red:#e04444;--red-bg:#fdf0f0;--red-text:#8b2020;
      --r:10px;--rl:14px;--rxl:20px;
      --shadow:0 1px 3px rgba(84,90,192,.08),0 4px 16px rgba(84,90,192,.06);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#13131a;--bg2:#1c1c26;--bg3:#22222f;
      --text:#e8e8f4;--text2:#8888a8;--text3:#55556a;
      --border:rgba(120,120,220,.12);--border2:rgba(120,120,220,.22);
      --brand-light:#1e1e35;--brand2-light:#2a1f15;
      --green-bg:#0d2d22;--green-text:#4dd4a0;
      --red-bg:#2d1010;--red-text:#f08080;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
    }}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;}

    /* Sidebar */
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;width:240px;
      background:var(--bg);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;z-index:100;
    }
    .slogo{
      padding:22px 20px 18px;
      border-bottom:1px solid var(--border);
    }
    .slogo svg{width:120px;height:auto;}
    .slogo-sub{font-size:11px;color:var(--text3);margin-top:6px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
    .snav{flex:1;padding:14px 10px;overflow-y:auto;}
    .nsec{
      padding:4px 12px;font-size:10px;font-weight:700;color:var(--text3);
      text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px;
    }
    .ni{
      display:flex;align-items:center;gap:10px;
      padding:9px 14px;font-size:13px;color:var(--text2);
      cursor:pointer;border-radius:var(--r);margin:1px 0;
      transition:all .15s;font-weight:500;
    }
    .ni:hover{background:var(--brand-light);color:var(--brand);}
    .ni.active{background:var(--brand-light);color:var(--brand);font-weight:600;}
    .ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
    .ni.active svg{opacity:1;}
    .sfooter{
      padding:14px 16px;border-top:1px solid var(--border);
      font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px;
    }
    .sdot{
      width:7px;height:7px;border-radius:50%;
      background:var(--green);flex-shrink:0;
      box-shadow:0 0 0 3px var(--green-bg);
    }

    /* Filter bar */
    .filterbar{
      position:sticky;top:0;z-index:50;
      background:var(--bg);
      border-bottom:1px solid var(--border);
      padding:10px 32px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .filterbar svg{color:var(--text3);flex-shrink:0;}
    .filterbar select,.filterbar input{
      font-size:13px;padding:6px 12px;
      border:1px solid var(--border2);border-radius:var(--r);
      background:var(--bg2);color:var(--text);height:34px;
      transition:border-color .15s;
    }
    .filterbar select:focus,.filterbar input:focus{outline:none;border-color:var(--brand);}
    .filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
    .filter-tag{
      display:inline-flex;align-items:center;gap:5px;
      font-size:12px;padding:4px 10px;border-radius:20px;
      background:var(--brand-light);color:var(--brand);font-weight:600;
    }
    .filter-tag button{background:none;border:none;cursor:pointer;color:var(--brand);font-size:14px;line-height:1;padding:0;opacity:.6;}
    .filter-tag button:hover{opacity:1;}
    .btn-reset{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--r);}
    .btn-reset:hover{background:var(--bg2);color:var(--text);}

    /* Main content */
    .main{margin-left:240px;padding:0;}
    .content{padding:32px 36px;max-width:1300px;}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px;}
    .ttitle{font-size:22px;font-weight:700;letter-spacing:-.02em;}
    .tsub{font-size:13px;color:var(--text3);margin-top:4px;}
    .tbadge{
      display:inline-block;font-size:11px;font-weight:700;
      padding:4px 12px;border-radius:20px;
      background:linear-gradient(135deg,var(--brand-light),var(--brand2-light));
      color:var(--brand);letter-spacing:.04em;text-transform:uppercase;
    }

    /* KPI Cards */
    .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
    .kcard{
      background:var(--bg);border:1px solid var(--border);
      border-radius:var(--rl);padding:18px 20px;
      box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;
      position:relative;overflow:hidden;
    }
    .kcard::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:var(--border);border-radius:var(--rl) var(--rl) 0 0;
    }
    .kcard.accent::before{background:var(--brand);}
    .kcard.accent2::before{background:var(--brand2);}
    .kcard.pos::before{background:var(--green);}
    .kcard:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(84,90,192,.12);}
    .klbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
    .kval{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.02em;}
    .ksub{font-size:12px;color:var(--text3);margin-top:5px;}
    .kcard.accent .kval{color:var(--brand);}
    .kcard.accent2 .kval{color:var(--brand2);}
    .kcard.pos .kval{color:var(--green);}
    .kcard.neg .kval{color:var(--red);}

    /* Sections */
    .sec{
      background:var(--bg);border:1px solid var(--border);
      border-radius:var(--rl);padding:22px 24px;
      margin-bottom:20px;box-shadow:var(--shadow);
    }
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
    .st{font-size:15px;font-weight:700;letter-spacing:-.01em;}
    .stag{font-size:12px;color:var(--text3);background:var(--bg2);padding:3px 10px;border-radius:20px;}

    /* Tables */
    .table-wrap{overflow-x:auto;margin:-4px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{
      text-align:left;font-size:10px;font-weight:700;color:var(--text3);
      padding:8px 12px;border-bottom:1px solid var(--border);
      text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;
      background:var(--bg2);
    }
    th:first-child{border-radius:var(--r) 0 0 0;}
    th:last-child{border-radius:0 var(--r) 0 0;}
    td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tbody tr{transition:background .1s;}
    tbody tr:hover td{background:var(--brand-light);}
    .tdt{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .tfoot td{background:var(--bg2);font-weight:700;border-top:2px solid var(--border);}

    /* Badges */
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .bg{background:var(--green-bg);color:var(--green-text);}
    .bb{background:var(--brand-light);color:var(--brand);}
    .br{background:var(--red-bg);color:var(--red-text);}

    /* Charts */
    .cw{position:relative;width:100%;}

    /* Import zone */
    .izone{
      border:2px dashed var(--border2);border-radius:var(--rxl);
      padding:56px 32px;text-align:center;cursor:pointer;
      transition:all .2s;background:var(--bg);
    }
    .izone:hover,.izone.drag{
      background:var(--brand-light);border-color:var(--brand);
    }
    .izone-icon{
      width:52px;height:52px;border-radius:var(--rl);
      background:var(--brand-light);display:flex;align-items:center;
      justify-content:center;margin:0 auto 16px;
    }
    .izone-icon svg{width:24px;height:24px;color:var(--brand);}
    .izone h3{font-size:17px;font-weight:700;margin-bottom:8px;}
    .izone p{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.7;max-width:400px;margin-left:auto;margin-right:auto;}
    .btn{
      font-size:13px;padding:9px 18px;border-radius:var(--r);
      border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:7px;
      transition:all .15s;
    }
    .btn-primary{background:var(--brand);color:#fff;}
    .btn-primary:hover{background:#454ab0;transform:translateY(-1px);}
    .iinfo{
      margin-top:20px;padding:18px 22px;
      background:var(--bg2);border-radius:var(--rl);
      font-size:13px;color:var(--text2);line-height:1.9;text-align:left;
    }
    .iinfo strong{color:var(--text);font-weight:700;}
    .spin{
      width:32px;height:32px;border-radius:50%;
      border:2.5px solid var(--border2);border-top-color:var(--brand);
      animation:spin .7s linear infinite;margin:0 auto 20px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:48px;color:var(--text3);font-size:13px;}

    /* Divider accent */
    .accent-bar{
      height:4px;border-radius:2px;
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      margin-bottom:28px;border-radius:var(--r);
    }
  </style>
</head>

<main class="main" id="main"></main>

<script>
const A={view:'import',data:null,f:{monthFrom:'',monthTo:'',campaign:''},sort:{key:'ca',dir:'desc'}};
const fE=n=>typeof n==='number'&&n!==0?n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}):'—';
const fP=n=>typeof n==='number'&&isFinite(n)?n.toFixed(1)+'%':'—';
const fR=n=>n==null?'—':(n>=0?'+':'')+Math.round(n)+'%';
const fN=n=>typeof n==='number'?n.toLocaleString('fr-FR'):'—';
const fCpl=n=>typeof n==='number'&&n>0?fE(n):'—';

function rb(roi){
  if(roi==null)return'<span class="badge" style="background:var(--bg2);color:var(--text3)">—</span>';
  if(roi>=500)return`<span class="badge bg">${fR(roi)}</span>`;
  if(roi>=0)return`<span class="badge bb">${fR(roi)}</span>`;
  return`<span class="badge br">${fR(roi)}</span>`;
}

function sortBy(key){
  A.sort.key===key?(A.sort.dir=A.sort.dir==='desc'?'asc':'desc'):(A.sort.key=key,A.sort.dir='desc');
  render();
}

function sortedCampaigns(){
  let c=[...(A.data?.campaigns||[])];
  if(A.f.campaign)c=c.filter(r=>r.campaign===A.f.campaign);
  const k=A.sort.key,dir=A.sort.dir==='desc'?-1:1;
  return c.map(r=>({...r,taux:r.nb_leads>0?r.nb_deals_gagnes/r.nb_leads*100:0,cpl_reel:r.nb_leads>0?Math.round(r.cout_ttc/r.nb_leads):0,cac_reel:r.nb_deals_gagnes>0?Math.round(r.cout_ttc/r.nb_deals_gagnes):0}))
    .sort((a,b)=>{const av=a[k]??-Infinity,bv=b[k]??-Infinity;return typeof av==='string'?av.localeCompare(bv)*dir:(av-bv)*dir;});
}

function setView(v){
  A.view=v;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  ['global','monthly','campaign','import'].forEach((x,i)=>{if(x===v)document.querySelectorAll('.ni')[i]?.classList.add('active');});
  render();
}

function loadJSON(txt){
  try{
    A.data=JSON.parse(txt);
    A.f={monthFrom:'',monthTo:'',campaign:''};
    document.getElementById('slbl').textContent=`Maj ${A.data.generated_at}`;
    try{ localStorage.setItem('oellear_roi_data', txt); }catch(e){}
    setView('global');
  }catch(e){alert('JSON invalide: '+e.message);}
}

function getMonths(){return A.data?[...new Set(A.data.monthly.map(r=>r.month))].sort():[];}
function getCampaigns(){return A.data?[...new Set(A.data.campaigns.map(r=>r.campaign))].filter(c=>c&&c!=='(Non renseigné)').sort():[];}

function filterMonthly(){
  if(!A.data)return[];
  return A.data.monthly.filter(r=>{
    if(A.f.monthFrom&&r.month<A.f.monthFrom)return false;
    if(A.f.monthTo&&r.month>A.f.monthTo)return false;
    return true;
  });
}

function computeTotals(monthly){
  const nb_leads=monthly.reduce((s,r)=>s+r.nb_leads,0);
  const nb_won=monthly.reduce((s,r)=>s+r.nb_deals_gagnes,0);
  const ca=monthly.reduce((s,r)=>s+r.ca,0);
  const cout_ht=monthly.reduce((s,r)=>s+r.cout_ht,0);
  const cout_ttc=monthly.reduce((s,r)=>s+r.cout_ttc,0);
  const benefice=ca-cout_ttc;
  const roi=cout_ttc>0?benefice/cout_ttc*100:null;
  return{nb_leads,nb_deals_gagnes:nb_won,ca,cout_ht,cout_ttc,benefice_net:benefice,roi,panier_moyen:nb_won>0?ca/nb_won:0};
}

function hasFilters(){return A.f.monthFrom||A.f.monthTo||A.f.campaign;}

function renderFilterBar(){
  if(!A.data||A.view==='import')return'';
  const months=getMonths(),camps=getCampaigns();
  const tags=[];
  if(A.f.monthFrom)tags.push({l:`Depuis ${A.f.monthFrom}`,k:'monthFrom'});
  if(A.f.monthTo)tags.push({l:`Jusqu'à ${A.f.monthTo}`,k:'monthTo'});
  if(A.f.campaign)tags.push({l:A.f.campaign.length>30?A.f.campaign.substring(0,30)+'…':A.f.campaign,k:'campaign'});
  return`<div class="filterbar">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
    <label style="font-size:12px;color:var(--text3)">De</label>
    <select onchange="A.f.monthFrom=this.value;render()">
      <option value="">Début</option>
      ${months.map(m=>`<option value="${m}" ${A.f.monthFrom===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <label style="font-size:12px;color:var(--text3)">À</label>
    <select onchange="A.f.monthTo=this.value;render()">
      <option value="">Fin</option>
      ${months.map(m=>`<option value="${m}" ${A.f.monthTo===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <div class="filter-sep"></div>
    <select style="max-width:220px" onchange="A.f.campaign=this.value;render()">
      <option value="">Toutes les campagnes</option>
      ${camps.map(c=>`<option value="${c}" ${A.f.campaign===c?'selected':''}>${c.length>45?c.substring(0,45)+'…':c}</option>`).join('')}
    </select>
    ${tags.length?`<div class="filter-sep"></div>${tags.map(t=>`<span class="filter-tag">${t.l}<button onclick="A.f['${t.k}']='';render()">×</button></span>`).join('')}<button class="btn-reset" onclick="A.f={monthFrom:'',monthTo:'',campaign:''};render()">Tout effacer</button>`:''}
    <span style="margin-left:auto;font-size:12px;color:var(--text3)" id="fcount"></span>
  </div>`;
}

      <div class="cw" style="height:210px"><canvas id="cl"></canvas></div>
    </div>
  </div>
  <script>(function(){

function rCampaign(){
  const c=sortedCampaigns();
  const fl=hasFilters()?' · filtré':'';
  const hasPeriod=A.f.monthFrom||A.f.monthTo;
  const cols=[
    {k:'campaign',l:'Campagne'},{k:'nb_leads',l:'Leads'},{k:'nb_deals_gagnes',l:'Gagnés'},
    {k:'taux',l:'Taux'},{k:'ca',l:'CA'},{k:'panier_moyen',l:'Panier'},
    {k:'cout_ht',l:'Coût HT'},{k:'cout_ttc',l:'Coût TTC'},
    {k:'cpl_reel',l:'CPL réel'},{k:'cac_reel',l:'CAC réel'},
    {k:'benefice_net',l:'Bénéfice'},{k:'roi',l:'ROI'}
  ];
  const thead=cols.map(({k,l})=>{
    const active=A.sort.key===k;
    const arrow=active?(A.sort.dir==='desc'?' &darr;':' &uarr;'):' <span style="opacity:.25">&updownarrow;</span>';
    return`<th onclick="sortBy('${k}')" style="cursor:pointer;user-select:none${active?';color:var(--brand)':''}">${l}${arrow}</th>`;
  }).join('');
  return`<div class="content">
    <div class="topbar">
      <div><div class="ttitle">Par campagne${fl}</div>
      <div class="tsub">${c.length} campagnes · triées par ${A.sort.key}${hasPeriod?' · <span style="color:var(--brand2)">filtre période non appliqué</span>':''}</div></div>
      <span class="tbadge">MaFormation</span>
    </div>
    <div class="accent-bar"></div>
    ${c.length===0?'<div class="empty">Aucune campagne.</div>':`
    <div class="sec">
      <div class="table-wrap"><table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${c.map(r=>`<tr>
          <td class="tdt" title="${r.campaign}"><strong>${r.campaign}</strong></td>
          <td>${fN(r.nb_leads)}</td><td>${fN(r.nb_deals_gagnes)}</td>
          <td>${fP(r.taux)}</td>
          <td><strong>${fE(r.ca)}</strong></td><td>${fE(r.panier_moyen)}</td>
          <td style="color:var(--text3)">${fE(r.cout_ht)}</td>
          <td>${fE(r.cout_ttc)}</td>
          <td style="color:var(--brand2);font-weight:600">${fCpl(r.cpl_reel)}</td>
          <td style="color:var(--brand2);font-weight:600">${fCpl(r.cac_reel)}</td>
          <td style="color:${r.benefice_net>=0?'var(--green)':'var(--red)'};font-weight:600">${fE(r.benefice_net)}</td>
          <td>${rb(r.roi)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`}
  </div>`;
}

function render(){
  const main=document.getElementById('main');
  if(!A.data&&A.view!=='import'){setView('import');return;}
  let html=renderFilterBar();
  if(A.view==='import')html=rImport();
  else if(A.view==='global')html+=rGlobal();
  else if(A.view==='monthly')html+=rMonthly();
  else if(A.view==='campaign')html+=rCampaign();
  main.innerHTML=html;
  main.querySelectorAll('script').forEach(s=>{const ns=document.createElement('script');ns.textContent=s.textContent;s.replaceWith(ns);});
  if(A.view==='import')setupDrop();
  const fc=document.getElementById('fcount');
  if(fc&&A.data){const m=filterMonthly();if(hasFilters())fc.textContent=`${m.reduce((s,r)=>s+r.nb_leads,0)} leads · ${m.reduce((s,r)=>s+r.nb_deals_gagnes,0)} gagnés`;}
}

function handleF(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>loadJSON(e.target.result);r.readAsText(f);
}

function setupDrop(){
  const z=document.getElementById('dz');if(!z)return;
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>loadJSON(ev.target.result);r.readAsText(f);});
}

// Charger les données depuis GitHub (fichier dans le repo)
(function(){
  const slbl = document.getElementById('slbl');
  slbl.textContent = 'Chargement...';
  fetch('/pipedrive_data.json?t=' + Date.now())
    .then(r => { if(!r.ok) throw new Error('Fichier introuvable'); return r.json(); })
    .then(data => {
      A.data = data;
      A.view = 'global';
      slbl.textContent = 'Maj ' + (data.generated_at||'');
      // Sauvegarder aussi en localStorage comme fallback
      try{ localStorage.setItem('oellear_roi_data', JSON.stringify(data)); }catch(e){}
      render();
    })
    .catch(() => {
      // Fallback localStorage si pas de fichier sur le serveur
      try{
        const saved = localStorage.getItem('oellear_roi_data');
        if(saved){
          A.data = JSON.parse(saved);
          slbl.textContent = 'Maj ' + (A.data.generated_at||'') + ' (local)';
          A.view = 'global';
        } else {
          slbl.textContent = 'Aucune donnée';
        }
      }catch(e){}
      render();
    });
})();

render();
</script>
