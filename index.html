<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oellear · ROI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brand:#545ac0;--brand2:#ef7738;--brand-light:#eeeffe;--brand2-light:#fff3ec;
      --bg:#fff;--bg2:#f8f8fb;--bg3:#f2f2f7;
      --text:#16161a;--text2:#5e5e72;--text3:#a0a0b8;
      --border:rgba(84,90,192,.1);--border2:rgba(84,90,192,.2);
      --green:#1a9e6e;--green-bg:#e6f7f1;--green-text:#0d6b4a;
      --red:#e04444;--red-bg:#fdf0f0;--red-text:#8b2020;
      --r:10px;--rl:14px;--rxl:20px;
      --shadow:0 1px 3px rgba(84,90,192,.08),0 4px 16px rgba(84,90,192,.06);
      --ch-maf:#545ac0;--ch-maf-bg:#eeeffe;
      --ch-google:#ea4335;--ch-google-bg:#fdecea;
      --ch-organic:#1a9e6e;--ch-organic-bg:#e6f7f1;
      --ch-tma:#854F0B;--ch-tma-bg:#FAEEDA;
      --ch-inbound:#185FA5;--ch-inbound-bg:#E6F1FB;
      --ch-autres:#5F5E5A;--ch-autres-bg:#F1EFE8;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#13131a;--bg2:#1c1c26;--bg3:#22222f;
      --text:#e8e8f4;--text2:#8888a8;--text3:#55556a;
      --border:rgba(120,120,220,.12);--border2:rgba(120,120,220,.22);
      --brand-light:#1e1e35;--brand2-light:#2a1f15;
      --green-bg:#0d2d22;--green-text:#4dd4a0;
      --red-bg:#2d1010;--red-text:#f08080;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
      --ch-maf-bg:#1e1e35;--ch-google-bg:#2d1010;--ch-organic-bg:#0d2d22;
    }}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
    .slogo{padding:22px 20px 18px;border-bottom:1px solid var(--border);}
    .slogo svg{width:120px;height:auto;}
    .slogo-sub{font-size:11px;color:var(--text3);margin-top:6px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
    .snav{flex:1;padding:14px 10px;overflow-y:auto;}
    .nsec{padding:4px 12px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px;}
    .ni{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-radius:var(--r);margin:1px 0;transition:all .15s;font-weight:500;}
    .ni:hover{background:var(--brand-light);color:var(--brand);}
    .ni.active{background:var(--brand-light);color:var(--brand);font-weight:600;}
    .ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
    .ni.active svg{opacity:1;}
    .ch-tabs{padding:8px 10px;border-top:1px solid var(--border);}
    .ch-tab{
      display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;
      color:var(--text2);cursor:pointer;border-radius:var(--r);margin:2px 0;
      transition:all .15s;font-weight:500;
    }
    .ch-tab:hover{background:var(--bg2);}
    .ch-tab.active{font-weight:700;}
    .ch-tab.active.maf{background:var(--ch-maf-bg);color:var(--ch-maf);}
    .ch-tab.active.google{background:var(--ch-google-bg);color:var(--ch-google);}
    .ch-tab.active.organic{background:var(--ch-organic-bg);color:var(--ch-organic);}
    .ch-tab.active.tma{background:var(--ch-tma-bg);color:var(--ch-tma);}
    .ch-tab.active.inbound{background:var(--ch-inbound-bg);color:var(--ch-inbound);}
    .ch-tab.active.autres{background:var(--ch-autres-bg);color:var(--ch-autres);}
    .ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .ch-tab.all .ch-dot{background:linear-gradient(135deg,var(--brand),var(--brand2));}
    .ch-tab.maf .ch-dot{background:var(--ch-maf);}
    .ch-tab.google .ch-dot{background:var(--ch-google);}
    .ch-tab.organic .ch-dot{background:var(--ch-organic);}
    .ch-tab.tma .ch-dot{background:var(--ch-tma);}
    .ch-tab.inbound .ch-dot{background:var(--ch-inbound);}
    .ch-tab.autres .ch-dot{background:var(--ch-autres);}
    .sfooter{padding:14px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);display:flex;flex-direction:column;gap:10px;}
    .sfooter-status{display:flex;align-items:center;gap:8px;}
    .sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 0 3px var(--green-bg);}
    .import-btn{
      width:100%;font-size:12px;font-weight:600;padding:8px 12px;
      border:1px dashed var(--border2);border-radius:var(--r);
      background:transparent;color:var(--text3);cursor:pointer;
      display:flex;align-items:center;gap:7px;transition:all .15s;
    }
    .import-btn:hover{background:var(--brand-light);color:var(--brand);border-color:var(--brand);}
    .filterbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .filterbar svg{color:var(--text3);flex-shrink:0;}
    .filterbar select{font-size:13px;padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);height:34px;transition:border-color .15s;}
    .filterbar select:focus{outline:none;border-color:var(--brand);}
    .filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
    .filter-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;background:var(--brand-light);color:var(--brand);font-weight:600;}
    .filter-tag button{background:none;border:none;cursor:pointer;color:var(--brand);font-size:14px;line-height:1;padding:0;opacity:.6;}
    .btn-reset{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--r);}
    .btn-reset:hover{background:var(--bg2);color:var(--text);}
    .main{margin-left:240px;}
    .content{padding:32px 36px;max-width:1300px;}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px;}
    .ttitle{font-size:22px;font-weight:700;letter-spacing:-.02em;}
    .tsub{font-size:13px;color:var(--text3);margin-top:4px;}
    .channel-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:.03em;}
    .channel-badge.maf{background:var(--ch-maf-bg);color:var(--ch-maf);}
    .channel-badge.google{background:var(--ch-google-bg);color:var(--ch-google);}
    .channel-badge.organic{background:var(--ch-organic-bg);color:var(--ch-organic);}
    .channel-badge.all{background:var(--brand-light);color:var(--brand);}
    .accent-bar{height:4px;background:linear-gradient(90deg,var(--brand),var(--brand2));margin-bottom:28px;border-radius:var(--r);}
    .accent-bar.google{background:linear-gradient(90deg,#ea4335,#fbbc04);}
    .accent-bar.organic{background:linear-gradient(90deg,#1a9e6e,#4dd4a0);}
    .accent-bar.tma{background:linear-gradient(90deg,#854F0B,#EF9F27);}
    .accent-bar.inbound{background:linear-gradient(90deg,#185FA5,#378ADD);}
    .accent-bar.autres{background:linear-gradient(90deg,#5F5E5A,#888780);}
    .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px;}
    .kcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--shadow);transition:transform .15s;position:relative;overflow:hidden;}
    .kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);}
    .kcard.accent::before{background:var(--brand);}
    .kcard.accent2::before{background:var(--brand2);}
    .kcard.pos::before{background:var(--green);}
    .kcard.google-k::before{background:#ea4335;}
    .kcard.organic-k::before{background:#1a9e6e;}
    .kcard:hover{transform:translateY(-1px);}
    .klbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
    .kval{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.02em;}
    .ksub{font-size:12px;color:var(--text3);margin-top:5px;}
    .kcard.accent .kval{color:var(--brand);}
    .kcard.accent2 .kval{color:var(--brand2);}
    .kcard.pos .kval{color:var(--green);}
    .kcard.neg .kval{color:var(--red);}
    .kcard.google-k .kval{color:#ea4335;}
    .kcard.organic-k .kval{color:#1a9e6e;}
    .sec{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px;margin-bottom:20px;box-shadow:var(--shadow);}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
    .st{font-size:15px;font-weight:700;}
    .stag{font-size:12px;color:var(--text3);background:var(--bg2);padding:3px 10px;border-radius:20px;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:var(--bg2);}
    td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:var(--brand-light);}
    .tfoot td{background:var(--bg2);font-weight:700;border-top:2px solid var(--border);}
    .tdt{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .bg{background:var(--green-bg);color:var(--green-text);}
    .bb{background:var(--brand-light);color:var(--brand);}
    .br{background:var(--red-bg);color:var(--red-text);}
    .cw{position:relative;width:100%;}
    .compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
    .compare-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:var(--shadow);}
    .compare-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .compare-stat{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);}
    .compare-stat:last-child{border-bottom:none;}
    .compare-stat .label{font-size:12px;color:var(--text3);}
    .compare-stat .val{font-size:14px;font-weight:700;}
    .izone{border:2px dashed var(--border2);border-radius:var(--rxl);padding:56px 32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);}
    .izone:hover,.izone.drag{background:var(--brand-light);border-color:var(--brand);}
    .izone-icon{width:52px;height:52px;border-radius:var(--rl);background:var(--brand-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
    .izone-icon svg{width:24px;height:24px;color:var(--brand);}
    .izone h3{font-size:17px;font-weight:700;margin-bottom:8px;}
    .izone p{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.7;max-width:400px;margin-left:auto;margin-right:auto;}
    .btn{font-size:13px;padding:9px 18px;border-radius:var(--r);border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:all .15s;}
    .btn-primary{background:var(--brand);color:#fff;}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px);}
    .iinfo{margin-top:20px;padding:18px 22px;background:var(--bg2);border-radius:var(--rl);font-size:13px;color:var(--text2);line-height:1.9;text-align:left;}
    .iinfo strong{color:var(--text);font-weight:700;}
    .empty{text-align:center;padding:48px;color:var(--text3);font-size:13px;}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="slogo">
    <svg viewBox="0 0 1217.01 227.95" xmlns="http://www.w3.org/2000/svg">
      <style>.cl1{fill:#ef7738}.cl2{fill:#545ac0}</style>
      <path class="cl2" d="M367.99,31.19c-46.04,0-78.21,34.1-78.21,82.9s32.07,82.66,77.99,82.66,78.66-34.1,78.66-82.9-32.25-82.66-78.45-82.66ZM368.23,166.63c-28.16,0-44.98-19.73-44.98-52.77s17.25-52.53,44.98-52.53,44.74,20.13,44.74,52.53-17.16,52.77-44.74,52.77Z"/>

    </svg>
    <div class="slogo-sub">ROI Dashboard</div>
  </div>
  <nav class="snav">
    <div class="nsec">Vues</div>
    <div class="ni active" onclick="setView('global')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Vue globale
    </div>
    <div class="ni" onclick="setView('monthly')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="12" rx="1.5"/><path d="M5 1v4M11 1v4M1 7h14"/></svg>
      Par mois
    </div>
    <div class="ni" onclick="setView('campaign')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l4-8 3 5 2-3 3 6"/><rect x="1" y="1" width="14" height="14" rx="2"/></svg>
      Par campagne
    </div>
  </nav>
  <div class="ch-tabs">
    <div class="nsec" style="margin-top:4px">Canal</div>
    <div class="ch-tab all active" onclick="setCh('all')"><span class="ch-dot"></span>Tous les canaux</div>
    <div class="ch-tab maf" onclick="setCh('maformation')"><span class="ch-dot"></span>MaFormation</div>
    <div class="ch-tab google" onclick="setCh('google')"><span class="ch-dot"></span>Google Ads</div>
    <div class="ch-tab organic" onclick="setCh('organic')"><span class="ch-dot"></span>Organic</div>
    <div class="ch-tab tma" onclick="setCh('tma')"><span class="ch-dot"></span>TMA</div>
    <div class="ch-tab inbound" onclick="setCh('inbound')"><span class="ch-dot"></span>Inbound</div>
    <div class="ch-tab autres" onclick="setCh('autres')"><span class="ch-dot"></span>Autres</div>

  <div class="sfooter">
    <div class="sfooter-status"><span class="sdot"></span><span id="slbl">Chargement...</span></div>
    <button class="import-btn" onclick="document.getElementById('fi-sb').click()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 12h10"/></svg>
      Mettre à jour les données
    </button>
    <input type="file" id="fi-sb" accept=".json" style="display:none" onchange="handleF(this)">
  </div>
</div>

<main class="main" id="main"></main>

<script>
const A={view:'global',data:null,ch:'all',f:{monthFrom:'',monthTo:'',campaign:''},sort:{key:'ca',dir:'desc'}};
const fE=n=>typeof n==='number'&&n!==0?n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}):'—';
const fP=n=>typeof n==='number'&&isFinite(n)?n.toFixed(1)+'%':'—';
const fR=n=>n==null?'—':(n>=0?'+':'')+Math.round(n)+'%';
const fN=n=>typeof n==='number'?n.toLocaleString('fr-FR'):'—';

function rb(roi){
  if(roi==null)return'<span class="badge" style="background:var(--bg2);color:var(--text3)">—</span>';
  if(roi>=500)return`<span class="badge bg">${fR(roi)}</span>`;
  if(roi>=0)return`<span class="badge bb">${fR(roi)}</span>`;
  return`<span class="badge br">${fR(roi)}</span>`;
}

const CH_LABELS={all:'Tous les canaux',maformation:'MaFormation',google:'Google Ads',organic:'Organic',tma:'TMA',inbound:'Inbound',autres:'Autres'};
const CH_COLORS={all:'var(--brand)',maformation:'var(--ch-maf)',google:'var(--ch-google)',organic:'var(--ch-organic)',tma:'var(--ch-tma)',inbound:'var(--ch-inbound)',autres:'var(--ch-autres)'};
const CH_CHART={all:'#545ac0',maformation:'#545ac0',google:'#ea4335',organic:'#1a9e6e',tma:'#854F0B',inbound:'#185FA5',autres:'#5F5E5A'};

function getCurrentData(){
  if(!A.data)return null;
  if(A.ch==='all')return null;
  return A.data.channels[A.ch]||null;
}

function setCh(ch){
  A.ch=ch;
  document.querySelectorAll('.ch-tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ch-tab')[['all','maformation','google','organic','tma','inbound','autres'].indexOf(ch)]?.classList.add('active');
  A.f={monthFrom:'',monthTo:'',campaign:''};
  render();
}

function setView(v){
  A.view=v;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  ['global','monthly','campaign'].forEach((x,i)=>{if(x===v)document.querySelectorAll('.ni')[i]?.classList.add('active');});
  render();
}

function loadJSON(txt){
  try{
    A.data=JSON.parse(txt);
    try{localStorage.setItem('oellear_roi_data',txt);}catch(e){}
    document.getElementById('slbl').textContent='Maj '+(A.data.generated_at||'');
    A.view='global';A.ch='all';
    setCh('all');
  }catch(e){alert('JSON invalide: '+e.message);}
}

function getMonths(){
  const d=getCurrentData();
  if(!d)return[...new Set(Object.values(A.data.channels).flatMap(c=>c.monthly.map(r=>r.month)))].sort();
  return d.monthly.map(r=>r.month);
}

function getCampaigns(){
  const d=getCurrentData();
  if(!d)return[];
  return[...new Set(d.campaigns.map(r=>r.campaign))].filter(c=>c&&c!=='(Non renseigné)').sort();
}

function filterMonthly(monthly){
  return monthly.filter(r=>{
    if(A.f.monthFrom&&r.month<A.f.monthFrom)return false;
    if(A.f.monthTo&&r.month>A.f.monthTo)return false;
    return true;
  });
}

function computeTotals(monthly,hasCosts=true){
  const nb_leads=monthly.reduce((s,r)=>s+r.nb_leads,0);
  const nb_won=monthly.reduce((s,r)=>s+r.nb_deals_gagnes,0);
  const ca=monthly.reduce((s,r)=>s+r.ca,0);
  const cout_ht=monthly.reduce((s,r)=>s+(r.cout_ht||0),0);
  const cout_ttc=monthly.reduce((s,r)=>s+(r.cout_ttc||0),0);
  const benefice=ca-cout_ttc;
  const roi=cout_ttc>0?benefice/cout_ttc*100:null;
  return{nb_leads,nb_deals_gagnes:nb_won,ca,cout_ht,cout_ttc,benefice_net:benefice,roi,panier_moyen:nb_won>0?ca/nb_won:0};
}

function hasFilters(){return A.f.monthFrom||A.f.monthTo||A.f.campaign;}

function renderFilterBar(){
  if(!A.data)return'';
  const months=getMonths();
  const camps=getCampaigns();
  const tags=[];
  if(A.f.monthFrom)tags.push({l:`Depuis ${A.f.monthFrom}`,k:'monthFrom'});
  if(A.f.monthTo)tags.push({l:`Jusqu'à ${A.f.monthTo}`,k:'monthTo'});
  if(A.f.campaign)tags.push({l:A.f.campaign.length>30?A.f.campaign.substring(0,30)+'…':A.f.campaign,k:'campaign'});
  return`<div class="filterbar">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
    <label style="font-size:12px;color:var(--text3)">De</label>
    <select onchange="A.f.monthFrom=this.value;render()">
      <option value="">Début</option>
      ${months.map(m=>`<option value="${m}" ${A.f.monthFrom===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <label style="font-size:12px;color:var(--text3)">À</label>
    <select onchange="A.f.monthTo=this.value;render()">
      <option value="">Fin</option>
      ${months.map(m=>`<option value="${m}" ${A.f.monthTo===m?'selected':''}>${m}</option>`).join('')}
    </select>
    ${camps.length?`<div class="filter-sep"></div>
    <select style="max-width:220px" onchange="A.f.campaign=this.value;render()">
      <option value="">Toutes campagnes</option>
      ${camps.map(c=>`<option value="${c}" ${A.f.campaign===c?'selected':''}>${c.length>45?c.substring(0,45)+'…':c}</option>`).join('')}
    </select>`:''}
    ${tags.length?`<div class="filter-sep"></div>${tags.map(t=>`<span class="filter-tag">${t.l}<button onclick="A.f['${t.k}']='';render()">×</button></span>`).join('')}<button class="btn-reset" onclick="A.f={monthFrom:'',monthTo:'',campaign:''};render()">Effacer</button>`:''}
    <span style="margin-left:auto;font-size:12px;color:var(--text3)" id="fcount"></span>
  </div>`;
}

function chBadge(ch){
  const label=CH_LABELS[ch]||ch;

  const k=A.sort.key,dir=A.sort.dir==='desc'?-1:1;
  camps=camps.map(r=>({...r,taux:r.nb_leads>0?r.nb_deals_gagnes/r.nb_leads*100:0,cpl_reel:r.nb_leads>0?Math.round(r.cout_ttc/r.nb_leads):0,cac_reel:r.nb_deals_gagnes>0?Math.round(r.cout_ttc/r.nb_deals_gagnes):0}))
    .sort((a,b)=>{const av=a[k]??-Infinity,bv=b[k]??-Infinity;return typeof av==='string'?av.localeCompare(bv)*dir:(av-bv)*dir;});

  const sortCols=hasCosts?[
    {k:'campaign',l:'Campagne'},{k:'nb_leads',l:'Leads'},{k:'nb_deals_gagnes',l:'Gagnés'},{k:'taux',l:'Taux'},
    {k:'ca',l:'CA'},{k:'panier_moyen',l:'Panier'},{k:'cout_ht',l:'Coût HT'},{k:'cout_ttc',l:'Coût TTC'},
    {k:'cpl_reel',l:'CPL réel'},{k:'cac_reel',l:'CAC réel'},{k:'benefice_net',l:'Bénéfice'},{k:'roi',l:'ROI'}
  ]:[
    {k:'campaign',l:'Campagne'},{k:'nb_leads',l:'Leads'},{k:'nb_deals_gagnes',l:'Gagnés'},{k:'taux',l:'Taux'},
    {k:'ca',l:'CA'},{k:'panier_moyen',l:'Panier'}
  ];

  const thead=sortCols.map(({k,l})=>{
    const active=A.sort.key===k;
    const arrow=active?(A.sort.dir==='desc'?' &darr;':' &uarr;'):' <span style="opacity:.25">&updownarrow;</span>';
    return`<th onclick="sortBy('${k}')" style="cursor:pointer;user-select:none${active?';color:var(--brand)':''}">${l}${arrow}</th>`;
  }).join('');

  return`<div class="content">
    <div class="topbar">
      <div><div class="ttitle">Par campagne${hasFilters()?' · filtré':''}</div><div class="tsub">${camps.length} campagnes</div></div>
      ${chBadge(ch)}
    </div>
    <div class="accent-bar ${ch}"></div>
    ${camps.length===0?'<div class="empty">Aucune campagne.</div>':`
    <div class="sec"><div class="table-wrap"><table>
      <thead><tr>${thead}</tr></thead>
      <tbody>${camps.map(r=>`<tr>
        <td class="tdt" title="${r.campaign}"><strong>${r.campaign}</strong></td>
        <td>${fN(r.nb_leads)}</td><td>${fN(r.nb_deals_gagnes)}</td>
        <td>${fP(r.taux)}</td>
        <td><strong>${fE(r.ca)}</strong></td><td>${fE(r.panier_moyen)}</td>
        ${hasCosts?`<td style="color:var(--text3)">${fE(r.cout_ht)}</td>
        <td>${fE(r.cout_ttc)}</td>
        <td style="color:var(--brand2);font-weight:600">${fE(r.cpl_reel)}</td>
        <td style="color:var(--brand2);font-weight:600">${fE(r.cac_reel)}</td>
        <td style="color:${r.benefice_net>=0?'var(--green)':'var(--red)'};font-weight:600">${fE(r.benefice_net)}</td>
        <td>${rb(r.roi)}</td>`:''}
      </tr>`).join('')}</tbody>
    </table></div></div>`}
  </div>`;
}

function sortBy(key){
  A.sort.key===key?(A.sort.dir=A.sort.dir==='desc'?'asc':'desc'):(A.sort.key=key,A.sort.dir='desc');
  render();
}

function render(){
  const main=document.getElementById('main');
  if(!A.data){main.innerHTML=rNoData();return;}
  const d=getCurrentData();
  let html=renderFilterBar();
  if(A.ch==='all'){
    if(A.view==='global')html+=rGlobalAll();
    else if(A.view==='monthly'){
      // Vue mensuelle combinée tous canaux
      const chs=A.data.channels;
      const allM=[...new Set(Object.values(chs).flatMap(c=>c.monthly.map(r=>r.month)))].sort();
      const combined=allM.map(m=>{
        const rows=Object.values(chs).map(c=>c.monthly.find(r=>r.month===m)||{nb_leads:0,nb_deals_crees:0,nb_prospects:0,nb_deals_gagnes:0,ca:0,cout_ht:0,cout_ttc:0,panier_moyen:0});
        const nb_leads=rows.reduce((s,r)=>s+r.nb_leads,0);
        const nb_won=rows.reduce((s,r)=>s+r.nb_deals_gagnes,0);
        const ca=rows.reduce((s,r)=>s+r.ca,0);
        return{month:m,nb_leads,nb_prospects:0,nb_deals_crees:0,nb_deals_gagnes:nb_won,ca,cout_ht:0,cout_ttc:0,panier_moyen:nb_won>0?ca/nb_won:0,benefice_net:ca};
      });
      const fakeCh={channel:'all',has_costs:false,monthly:combined,campaigns:[]};
      html+=rMonthly(fakeCh);
    }
    else html+=`<div class="content"><div class="empty">Sélectionnez un canal pour voir le détail par campagne.</div></div>`;
  } else if(d){
    if(A.view==='global')html+=rChannelGlobal(d);
    else if(A.view==='monthly')html+=rMonthly(d);
    else if(A.view==='campaign')html+=rCampaign(d);
  }
  main.innerHTML=html;
  main.querySelectorAll('script').forEach(s=>{const ns=document.createElement('script');ns.textContent=s.textContent;s.replaceWith(ns);});
}

function handleF(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>loadJSON(e.target.result);r.readAsText(f);
}

// Charger depuis serveur puis localStorage
(function(){
  const slbl=document.getElementById('slbl');
  fetch('/pipedrive_data.json?t='+Date.now(),{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(data=>{A.data=data;slbl.textContent='Maj '+(data.generated_at||'');try{localStorage.setItem('oellear_roi_data',JSON.stringify(data));}catch(e){}render();})
    .catch(()=>{
      try{const s=localStorage.getItem('oellear_roi_data');if(s){A.data=JSON.parse(s);slbl.textContent='Maj '+(A.data.generated_at||'')+' (local)';}}catch(e){}
      render();
    });
})();

render();
</script>
</body>
</html>
